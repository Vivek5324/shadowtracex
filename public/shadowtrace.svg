<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" fill="#050a0f" />
  
  <!-- Outer Shield -->
  <path d="M 50 10 L 90 25 L 85 65 C 80 85 50 95 50 95 C 50 95 20 85 15 65 L 10 25 Z" 
        fill="none" stroke="#00ff41" stroke-width="5" filter="url(#glow)" />
        
  <!-- Inner Shield Glow -->
  <path d="M 50 18 L 81 30 L 77 62 C 73 78 50 86 50 86 C 50 86 27 78 23 62 L 19 30 Z" 
        fill="#00ff41" opacity="0.15" />
        
  <!-- Core Symbol -->
  <text x="50" y="66" font-family="monospace" font-size="44" font-weight="900" 
        fill="#0ff" text-anchor="middle" filter="url(#glow)">X</text>
</svg>
